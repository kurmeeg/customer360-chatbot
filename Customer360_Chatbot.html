<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer 360 – Ask AI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;width:100%;font-family:'DM Sans',sans-serif;background:#ffffff;overflow:hidden;-webkit-font-smoothing:antialiased}

  /* ── Collapsed: vertical centered button ── */
  .collapsed{
    height:100%;width:100%;display:flex;flex-direction:column;
    align-items:center;justify-content:center;background:#ffffff;cursor:pointer;
  }
  .collapsed:hover .fab{transform:scale(1.08)}
  .collapsed.hidden{display:none}
  .fab{
    width:50px;height:50px;background:linear-gradient(135deg,#3b82f6,#6366f1);
    border-radius:14px;display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 20px rgba(59,130,246,0.35);transition:transform 0.2s;
  }
  .fab img{width:28px;height:28px;object-fit:contain;border-radius:5px}
  .fab-label{margin-top:6px;font-size:10px;color:#3b5458;font-weight:500}

  /* ── Expanded: full vertical chat ── */
  .expanded{
    height:100%;width:100%;display:none;flex-direction:column;background:#ffffff;
  }
  .expanded.active{display:flex}

  /* ── Header ── */
  .hdr{
    padding:6px 8px;display:flex;align-items:center;gap:6px;
    border-bottom:1px solid rgba(59,90,96,0.2);background:rgba(255,255,255,0.5);
    flex-shrink:0;backdrop-filter:blur(10px);
  }
  .hdr-icon{
    width:24px;height:24px;background:linear-gradient(135deg,#3b82f6,#6366f1);
    border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .hdr-icon img{width:16px;height:16px;object-fit:contain;border-radius:2px}
  .hdr-txt h1{font-size:10px;font-weight:600;color:#1e293b}
  .hdr-txt p{font-size:7px;color:#64748b;margin-top:0px}
  .btn-min{
    margin-left:auto;width:22px;height:22px;background:rgba(255,255,255,0.6);
    border:1px solid rgba(59,90,96,0.2);border-radius:5px;display:flex;
    align-items:center;justify-content:center;cursor:pointer;color:#64748b;
    font-size:12px;line-height:1;
  }
  .btn-min:hover{background:rgba(255,255,255,0.9);color:#1e293b}

  /* ── Desc text ── */
  .desc{
    padding:4px 10px;font-size:8px;color:#475569;line-height:1.35;
    border-bottom:1px solid rgba(59,90,96,0.12);background:rgba(255,255,255,0.3);
    flex-shrink:0;
  }

  /* ── API bar ── */
  .api-bar{
    padding:5px 10px;border-bottom:1px solid rgba(59,90,96,0.12);
    background:rgba(255,255,255,0.3);display:flex;align-items:center;gap:4px;
    flex-shrink:0;
  }
  .api-bar label{font-size:7px;color:#64748b;white-space:nowrap}
  .api-input{
    flex:1;background:rgba(255,255,255,0.7);border:1px solid rgba(59,90,96,0.18);
    border-radius:4px;padding:2px 5px;font-size:7px;font-family:'JetBrains Mono',monospace;
    color:#1e293b;outline:none;min-width:0;
  }
  .api-input:focus{border-color:#3b82f6}
  .api-input::placeholder{color:#94a3b8}
  .btn-save{
    background:#3b82f6;color:#fff;border:none;border-radius:4px;
    padding:2px 6px;font-size:7px;font-weight:500;cursor:pointer;
    font-family:'DM Sans',sans-serif;
  }
  .btn-save.saved{background:#059669}

  /* ── Chat area ── */
  .chat-area{
    flex:1;overflow-y:auto;padding:8px;display:flex;
    flex-direction:column;gap:8px;scroll-behavior:smooth;
  }
  .chat-area::-webkit-scrollbar{width:2px}
  .chat-area::-webkit-scrollbar-thumb{background:rgba(59,90,96,0.2);border-radius:2px}

  /* ── Suggestions ── */
  .suggestions{display:flex;flex-direction:column;gap:4px;padding:0 2px}
  .suggestion{
    background:rgba(255,255,255,0.55);border:1px solid rgba(59,90,96,0.15);border-radius:8px;
    padding:6px 8px;font-size:8px;color:#475569;cursor:pointer;
    transition:all 0.2s;font-family:'DM Sans',sans-serif;text-align:left;
  }
  .suggestion:hover{border-color:#3b82f6;color:#1e293b;background:rgba(255,255,255,0.8)}

  /* ── Messages ── */
  .msg{display:flex;gap:5px;max-width:98%;animation:msgIn 0.25s ease-out}
  @keyframes msgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
  .msg.user{align-self:flex-end;flex-direction:row-reverse}
  .msg.ai{align-self:flex-start}
  .msg-avatar{
    width:20px;height:20px;border-radius:5px;display:flex;
    align-items:center;justify-content:center;font-size:7px;font-weight:700;
    flex-shrink:0;margin-top:1px;color:#fff;
  }
  .msg.user .msg-avatar{background:#3b82f6}
  .msg.ai .msg-avatar{background:linear-gradient(135deg,#3b82f6,#6366f1)}
  .msg-body{
    padding:5px 7px;border-radius:8px;font-size:8px;line-height:1.45;
    white-space:pre-wrap;word-break:break-word;
    -webkit-user-select:none;-moz-user-select:none;user-select:none;
  }
  .msg.user .msg-body{background:#3b82f6;border-bottom-right-radius:2px;color:#fff}
  .msg.ai .msg-body{background:rgba(255,255,255,0.65);border:1px solid rgba(59,90,96,0.12);border-bottom-left-radius:2px;color:#1e293b}
  .msg.ai .msg-body strong{color:#1d4ed8;font-weight:600}
  .msg.ai .msg-body code{font-family:'JetBrains Mono',monospace;background:rgba(0,0,0,0.05);padding:0 2px;border-radius:2px;font-size:7px}

  .typing{display:flex;gap:3px;padding:3px 0}
  .typing span{width:4px;height:4px;border-radius:50%;background:#94a3b8;animation:blink 1.4s infinite both}
  .typing span:nth-child(2){animation-delay:0.2s}
  .typing span:nth-child(3){animation-delay:0.4s}
  @keyframes blink{0%,80%,100%{opacity:0.25;transform:scale(0.8)}40%{opacity:1;transform:scale(1)}}

  /* ── Footer / disclaimer ── */
  .footer{
    padding:3px 10px;font-size:6px;color:#94a3b8;text-align:center;
    border-top:1px solid rgba(59,90,96,0.1);background:rgba(255,255,255,0.2);
    flex-shrink:0;
  }

  /* ── Input bar ── */
  .input-bar{
    padding:6px 8px;border-top:1px solid rgba(59,90,96,0.15);
    background:rgba(255,255,255,0.45);display:flex;align-items:flex-end;gap:5px;
    flex-shrink:0;backdrop-filter:blur(8px);
  }
  .input-wrap{
    flex:1;background:rgba(255,255,255,0.7);border:1px solid rgba(59,90,96,0.18);
    border-radius:7px;display:flex;align-items:flex-end;
    transition:border-color 0.2s;min-height:26px;
  }
  .input-wrap:focus-within{border-color:#3b82f6}
  #userInput{
    flex:1;background:transparent;border:none;padding:6px 7px;
    font-size:8px;color:#1e293b;outline:none;resize:none;
    max-height:60px;line-height:1.4;font-family:'DM Sans',sans-serif;
  }
  #userInput::placeholder{color:#94a3b8}
  .btn-send{
    width:26px;height:26px;background:#3b82f6;border:none;border-radius:7px;
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    transition:all 0.2s;flex-shrink:0;
  }
  .btn-send:hover{opacity:0.85}
  .btn-send:disabled{opacity:0.35;cursor:not-allowed}
  .btn-send svg{width:12px;height:12px}
</style>

<script>
let API_KEY='',conversationHistory=[],isLoading=false;

// Safe localStorage wrapper
function lsGet(k){try{return localStorage.getItem(k)}catch(e){return null}}
function lsSet(k,v){try{localStorage.setItem(k,v)}catch(e){}}

// Restore state from localStorage on load
(function(){
  const savedKey=lsGet('c360_apikey');
  if(savedKey)API_KEY=savedKey;
  const savedHistory=lsGet('c360_history');
  if(savedHistory)try{conversationHistory=JSON.parse(savedHistory)}catch(e){}
  document.addEventListener('DOMContentLoaded',function(){
    if(savedKey){document.getElementById('apiKeyInput').value=savedKey;var b=document.getElementById('btnSave');b.textContent='✓';b.classList.add('saved')}
    var wasExpanded=lsGet('c360_expanded');
    if(wasExpanded==='true')expandChat();
    var savedMessages=lsGet('c360_messages');
    if(savedMessages){
      try{var msgs=JSON.parse(savedMessages);
      if(msgs.length>0){var sb=document.getElementById('suggestionsBlock');if(sb)sb.remove();msgs.forEach(function(m){addMessage(m.role,m.text)})}}catch(e){}
    }
    // Backup click handler for collapsed view (in case onclick attribute is stripped)
    var cv=document.getElementById('collapsedView');
    if(cv)cv.addEventListener('click',expandChat);
  });
})();

function saveState(){
  lsSet('c360_history',JSON.stringify(conversationHistory.slice(-20)));
  var msgs=[];document.querySelectorAll('.msg').forEach(function(m){
    var role=m.classList.contains('user')?'user':'ai';
    var body=m.querySelector('.msg-body');if(body)msgs.push({role:role,text:body.innerHTML.replace(/<strong>(.*?)<\/strong>/g,'**$1**').replace(/<code>(.*?)<\/code>/g,'`$1`').replace(/<br\s*\/?>/g,'\n')});
  });
  lsSet('c360_messages',JSON.stringify(msgs.slice(-40)));
}

function expandChat(){
  document.getElementById('collapsedView').classList.add('hidden');
  document.getElementById('expandedView').classList.add('active');
  lsSet('c360_expanded','true');
}
function collapseChat(){
  document.getElementById('expandedView').classList.remove('active');
  document.getElementById('collapsedView').classList.remove('hidden');
  lsSet('c360_expanded','false');
}

function findCustomerData(query) {
  const q = query.toLowerCase().normalize('NFC');
  const matches = CUSTOMER_DATA.filter(c => {
    const name = c[0].toLowerCase().normalize('NFC');
    const code = c[1].toLowerCase();
    if (name.length > 3 && q.includes(name)) return true;
    if (code.length > 3 && q.includes(code)) return true;
    const nameWords = name.split(/[\s,]+/).filter(w => w.length > 3);
    const matchCount = nameWords.filter(w => q.includes(w)).length;
    if (nameWords.length > 0 && matchCount >= Math.ceil(nameWords.length * 0.5)) return true;
    return false;
  });
  if (matches.length === 0) return '';
  const months = ['Jan24','Feb24','Mar24','Apr24','May24','Jun24','Jul24','Aug24','Sep24','Oct24','Nov24','Dec24','Jan25','Feb25','Mar25','Apr25','May25','Jun25','Jul25','Aug25','Sep25','Oct25','Nov25','Dec25'];
  let ctx = '\n\n## CUSTOMER 360 DATA (matched from embedded data)\n';
  ctx += 'Below is the COMPLETE view across all models for this customer. Use ALL of this data to answer.\n';
  matches.slice(0, 10).forEach(c => {
    ctx += `\n### ${c[0]} (${c[1]}) | BU: ${c[2]} | Country: ${c[3]}\n`;
    ctx += `\n**SUBSCRIPTION REVENUE (SB Model):**\n`;
    ctx += `2024 Total: ${c[4]}M DKK | 2025 Total: ${c[5]}M DKK`;
    if(c[4]!==0) ctx += ` | YoY: ${((c[5]-c[4])/Math.abs(c[4])*100).toFixed(1)}%`;
    ctx += `\nMonthly 2024: `;
    for(let i=0;i<12;i++) ctx += `${months[i]}:${c[6][i]} `;
    ctx += `\nMonthly 2025: `;
    for(let i=12;i<24;i++) ctx += `${months[i]}:${c[6][i]} `;
    ctx += '\n';
    
    // CS data (index 7)
    const cs = c[7];
    ctx += `\n**CUSTOMER SERVICE (CS Model):**\n`;
    if(cs && cs.t > 0) {
      ctx += `Total Cases: ${cs.t.toLocaleString()} | Closed: ${cs.c.toLocaleString()} | Open: ${cs.o} | Avg/Month: ${cs.a}\n`;
      ctx += `Close Rate: ${(cs.c/cs.t*100).toFixed(1)}% | CS BU: ${cs.b}\n`;
    } else if(cs && cs.note) {
      ctx += `${cs.note}\n`;
    } else {
      ctx += `No per-customer CS case data available. Check BU-level case data above.\n`;
    }
    
    // SR note
    ctx += `\n**SALES PIPELINE (SR Model):**\n`;
    ctx += `Per-customer pipeline data is tracked at BU level. Refer to the SR pipeline section above for ${c[2]} BU pipeline.\n`;
  });
  return ctx;
}

function saveApiKey(){const v=document.getElementById('apiKeyInput').value.trim();if(!v)return;API_KEY=v;lsSet('c360_apikey',v);const b=document.getElementById('btnSave');b.textContent='✓';b.classList.add('saved');setTimeout(()=>{b.textContent='Save';b.classList.remove('saved')},2000)}
function askSuggestion(el){
  const sb=document.getElementById('suggestionsBlock');if(sb)sb.remove();
  document.getElementById('userInput').value=el.textContent;sendMessage();
}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,60)+'px'}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}}
function addMessage(role,text){
  const sb=document.getElementById('suggestionsBlock');if(sb)sb.remove();
  const chat=document.getElementById('chatArea');const div=document.createElement('div');div.className='msg '+role;const av=document.createElement('div');av.className='msg-avatar';av.textContent=role==='user'?'👤':'EG';const body=document.createElement('div');body.className='msg-body';body.innerHTML=text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/`(.*?)`/g,'<code>$1</code>').replace(/\n/g,'<br>');div.appendChild(av);div.appendChild(body);chat.appendChild(div);chat.scrollTop=chat.scrollHeight;
}
function addTyping(){const chat=document.getElementById('chatArea');const div=document.createElement('div');div.className='msg ai';div.id='typingMsg';const av=document.createElement('div');av.className='msg-avatar';av.textContent='EG';const body=document.createElement('div');body.className='msg-body';body.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';div.appendChild(av);div.appendChild(body);chat.appendChild(div);chat.scrollTop=chat.scrollHeight}
function removeTyping(){const el=document.getElementById('typingMsg');if(el)el.remove()}
async function sendMessage(){
  const input=document.getElementById('userInput');const text=input.value.trim();
  if(!text||isLoading)return;
  if(!API_KEY){addMessage('ai','⚠️ Enter your API key and click **Save** first.');return}
  isLoading=true;document.getElementById('btnSend').disabled=true;
  input.value='';input.style.height='auto';
  addMessage('user',text);addTyping();
  conversationHistory.push({role:'user',content:text});
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1500,system:DASHBOARD_CONTEXT+findCustomerData(text),messages:conversationHistory.slice(-20)})
    });
    removeTyping();
    if(!resp.ok){const err=await resp.json().catch(()=>({}));addMessage('ai','❌ '+(err?.error?.message||'Error '+resp.status));conversationHistory.pop()}
    else{const data=await resp.json();const reply=data.content.map(c=>c.text||'').join('\n').trim();addMessage('ai',reply);conversationHistory.push({role:'assistant',content:reply})}
    saveState();
  }catch(err){removeTyping();addMessage('ai','❌ '+err.message);conversationHistory.pop()}
  isLoading=false;document.getElementById('btnSend').disabled=false;input.focus()
}
</script>
