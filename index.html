  html,body{height:100%;width:100%;font-family:'DM Sans',sans-serif;background:#fff;overflow:hidden;-webkit-font-smoothing:antialiased}
  .collapsed{height:100%;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff;cursor:pointer}

  .fab img{width:28px;height:28px;object-fit:contain;border-radius:5px}
  .fab-label{margin-top:6px;font-size:10px;color:#3b5a60;font-weight:500}
  .expanded{height:100%;width:100%;display:none;flex-direction:column;background:#fff}
  .expanded.active{display:flex}
  .hdr{padding:6px 8px;display:flex;align-items:center;gap:6px;border-bottom:1px solid rgba(59,90,96,0.2);background:rgba(255,255,255,0.5);flex-shrink:0}
  .hdr img{width:30px;height:30px;border-radius:8px}
  .hdr-txt h1{font-size:10px;font-weight:600;color:#1e293b;line-height:1.2}
  .hdr-txt p{font-size:7px;color:#3b82f6;font-weight:500}
  .btn-min{margin-left:auto;background:none;border:none;font-size:14px;cursor:pointer;color:#94a3b8;padding:2px 4px}
  .desc{padding:4px 10px;font-size:8px;color:#475569;line-height:1.35;border-bottom:1px solid rgba(59,90,96,0.12);background:rgba(255,255,255,0.3);flex-shrink:0}

  .auth-row input{flex:1;padding:2px 5px;font-size:7px;font-family:'JetBrains Mono',monospace;border:1px solid #e2e8f0;border-radius:4px;background:#f8fafc;color:#334155}
  .auth-row button,.auth-btn{padding:2px 8px;font-size:7px;font-weight:500;background:#3b82f6;color:#fff;border:none;border-radius:4px;cursor:pointer;font-family:inherit}

  .auth-btn.ms svg{width:12px;height:12px}

  .mode-bar{padding:4px 10px;display:flex;gap:3px;align-items:center;border-bottom:1px solid rgba(59,90,96,0.1);flex-shrink:0}
  .mode-bar span{font-size:7px;color:#94a3b8;margin-right:2px}
  .mode-btn{padding:3px 8px;font-size:7px;border:1px solid #e2e8f0;background:#fff;color:#475569;border-radius:10px;cursor:pointer;font-family:inherit}
  .mode-btn.active{background:#3b82f6;color:#fff;border-color:#3b82f6}
  .messages{flex:1;overflow-y:auto;padding:8px 10px;display:flex;flex-direction:column;gap:6px}
  .msg{display:flex;gap:5px;max-width:95%}
  .msg.user{align-self:flex-end;flex-direction:row-reverse}
  .msg-avi{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:6px;font-weight:600;flex-shrink:0}
  .msg.ai .msg-avi{background:#3b82f6;color:#fff}
  .msg.user .msg-avi{background:#e2e8f0;color:#475569}
  .msg-body{padding:5px 7px;border-radius:8px;font-size:8px;line-height:1.45;word-wrap:break-word;overflow-wrap:break-word}
  .msg.ai .msg-body{background:#f1f5f9;color:#1e293b;border-bottom-left-radius:2px}
  .msg.user .msg-body{background:#3b82f6;color:#fff;border-bottom-right-radius:2px}
  .msg-body strong{font-weight:600}
  .msg-body code{font-family:'JetBrains Mono',monospace;font-size:7px;background:rgba(0,0,0,0.06);padding:1px 3px;border-radius:3px}
  .typing{display:flex;gap:3px;padding:4px 7px}
  .typing span{width:4px;height:4px;background:#94a3b8;border-radius:50%;animation:bounce 1.2s infinite}
  .typing span:nth-child(2){animation-delay:0.2s}
  .typing span:nth-child(3){animation-delay:0.4s}

  .suggestion{display:block;width:100%;text-align:left;padding:6px 8px;font-size:8px;color:#475569;background:#fff;border:1px solid #e2e8f0;border-radius:8px;cursor:pointer;font-family:inherit;margin-bottom:4px;transition:border-color 0.15s}

<script>
// ======== CONFIG ========
const CONFIG = {
  clientId: 'df9a6902-2129-4a44-83b9-46a01a1fda1a',
  tenantId: 'b1bc47a9-e2bc-4220-bdb5-7244799f5e49',
  workspaceId: '0cccd467-8d89-4b0f-a6f1-3285eeb6a11a',
  datasetId: '8ec0f1f4-1ac9-45f2-908f-da1058316c57',
  redirectUri: window.location.origin + window.location.pathname,
  scopes: ['https://analysis.windows.net/powerbi/api/Dataset.Read.All']
};

// ======== STATE ========
let API_KEY = '', conversationHistory = [], isLoading = false;
let pbiToken = null, msalInstance = null;
window.dataMode = 'kpi';
window._lastCustomer = null;
window._lastYYYYMM = null;

// ======== MSAL INIT ========
function initMsal() {
  const msalConfig = {
    auth: {
      clientId: CONFIG.clientId,
      authority: `https://login.microsoftonline.com/${CONFIG.tenantId}`,
      redirectUri: CONFIG.redirectUri
    },
    cache: { cacheLocation: 'localStorage' }
  };
  msalInstance = new msal.PublicClientApplication(msalConfig);
  // Check if already signed in
  const accounts = msalInstance.getAllAccounts();
  if (accounts.length > 0) {
    msalInstance.setActiveAccount(accounts[0]);
    acquireTokenSilent();
  }
}

async function signIn() {
  try {
    const resp = await msalInstance.loginPopup({ scopes: CONFIG.scopes });
    msalInstance.setActiveAccount(resp.account);
    await acquireTokenSilent();
  } catch (err) {
    showAuthStatus('Sign-in failed: ' + err.message, true);
  }
}

async function acquireTokenSilent() {
  try {
    const resp = await msalInstance.acquireTokenSilent({
      scopes: CONFIG.scopes,
      account: msalInstance.getActiveAccount()
    });
    pbiToken = resp.accessToken;
    const name = msalInstance.getActiveAccount().name || 'User';
    showAuthStatus('✓ Signed in as ' + name);
    document.getElementById('btnSignIn').textContent = '✓ ' + name;
    document.getElementById('btnSignIn').style.background = '#22c55e';
  } catch (err) {
    // Fallback to popup
    try {
      const resp = await msalInstance.acquireTokenPopup({ scopes: CONFIG.scopes });
      pbiToken = resp.accessToken;
      showAuthStatus('✓ Signed in');
    } catch (e) {
      showAuthStatus('Token error: ' + e.message, true);
    }
  }
}

function showAuthStatus(msg, isError) {
  const el = document.getElementById('authStatus');
  el.textContent = msg;
  el.style.display = 'inline';
  el.className = 'auth-status' + (isError ? ' error' : '');
}

// ======== POWER BI REST API ========
async function executeDax(daxQuery) {
  if (!pbiToken) {
    await acquireTokenSilent();
    if (!pbiToken) throw new Error('Not signed in to Power BI');
  }
  const url = `https://api.powerbi.com/v1.0/myorg/groups/${CONFIG.workspaceId}/datasets/${CONFIG.datasetId}/executeQueries`;
  const resp = await fetch(url, {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + pbiToken,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      queries: [{ query: daxQuery }],
      serializerSettings: { includeNulls: true }
    })
  });
  if (resp.status === 401) {
    pbiToken = null;
    await acquireTokenSilent();
    throw new Error('Token expired — please try again');
  }
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error('PBI API error: ' + (err?.error?.message || resp.status));
  }
  const data = await resp.json();
  return data.results[0].tables[0].rows;
}

// ======== DAX QUERY BUILDERS ========
function buildKpiQuery(customer, yyyymm) {
  const custFilter = `'SB_FactCustomer'[Account Name]="${customer}"`;
  const timeFilter = yyyymm ? `, 'SB_DimDate'[YYYYMM]="${yyyymm}"` : '';
  return `EVALUATE ROW(
    "MRR", ROUND(CALCULATE([SB_MRR], ${custFilter}${timeFilter}),0),
    "Growth", ROUND(CALCULATE([SB_Growth_test]*100, ${custFilter}${timeFilter}),1),
    "NRR", ROUND(CALCULATE([SB_NRR_test]*100, ${custFilter}${timeFilter}),1),
    "GRR", ROUND(CALCULATE([SB_GRR_test]*100, ${custFilter}${timeFilter}),1)
  )`;
}

function buildCsQuery(customer, yyyymm) {
  const custFilter = `'CS_datamart dimAccount'[Name]="${customer}"`;
  const timeFilter = yyyymm ? `, 'CS_datamart dimTime'[YYYYMM]="${yyyymm}"` : '';
  return `EVALUATE ROW(
    "Opened", CALCULATE([CS_Cases], ${custFilter}${timeFilter}),
    "Closed", CALCULATE([CS_Closed Cases1], ${custFilter}${timeFilter}),
    "Backlog", CALCULATE([CS_Backlog - Monthly Reporting], ${custFilter}${timeFilter})
  )`;
}

function buildDwhQuery(customer) {
  const f = `'SB_FactCustomer'[Account Name]="${customer}"`;
  return `EVALUATE ROW(
    "Y24", ROUND(CALCULATE(SUM('SB_FactCustomer'[DKK BR]), ${f}, YEAR('SB_FactCustomer'[Period])=2024),2),
    "Y25", ROUND(CALCULATE(SUM('SB_FactCustomer'[DKK BR]), ${f}, YEAR('SB_FactCustomer'[Period])=2025),2),
    "Y26", ROUND(CALCULATE(SUM('SB_FactCustomer'[DKK BR]), ${f}, YEAR('SB_FactCustomer'[Period])=2026),2)
  )`;
}

function buildInfoQuery(customer) {
  return `EVALUATE TOPN(1, FILTER(SUMMARIZE('SB_FactCustomer', 'SB_FactCustomer'[Account Name], 'SB_FactCustomer'[BU], 'SB_FactCustomer'[Account Country]), 'SB_FactCustomer'[Account Name]="${customer}"))`;
}

// ======== EXTRACT CUSTOMER + YYYYMM ========
function extractParams(query) {
  const q = query.toLowerCase().normalize('NFC');
  let yyyymm = null;
  const ymMatch = q.match(/\b(2024|2025|2026)(0[1-9]|1[0-2])\b/);
  if (ymMatch) yyyymm = ymMatch[0];
  if (!yyyymm) {
    const months = {jan:'01',feb:'02',mar:'03',apr:'04',may:'05',jun:'06',jul:'07',aug:'08',sep:'09',oct:'10',nov:'11',dec:'12',january:'01',february:'02',march:'03',april:'04',june:'06',july:'07',august:'08',september:'09',october:'10',november:'11',december:'12'};
    for (const [mName, mNum] of Object.entries(months)) {
      const p1 = q.match(new RegExp(mName+'\\s*(2024|2025|2026)'));
      const p2 = q.match(new RegExp('(2024|2025|2026)\\s*'+mName));
      if (p1) { yyyymm = p1[1] + mNum; break; }
      if (p2) { yyyymm = p2[1] + mNum; break; }
    }
  }
  // Extract customer — try to find a known pattern or use any capitalized words
  let customer = null;
  // Remove the YYYYMM part from query for cleaner matching
  let cleanQ = query.replace(/\b\d{6}\b/g, '').replace(/\b(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec|january|february|march|april|june|july|august|september|october|november|december)\s*(2024|2025|2026)\b/gi, '').replace(/\b(2024|2025|2026)\s*(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec|january|february|march|april|june|july|august|september|october|november|december)\b/gi, '').trim();
  // The remaining text is likely the customer name
  if (cleanQ.length > 2) customer = cleanQ.replace(/^(show|give|tell|what|how|me|is|about|for|the|of|in|data|everything|full|360|view)\s+/gi, '').replace(/\s+(data|kpi|revenue|mrr|growth|cases|info|details|for)$/gi, '').trim();
  if (customer && customer.length < 3) customer = null;
  // Fallback to last customer
  if (!customer && window._lastCustomer) customer = window._lastCustomer;
  if (customer) window._lastCustomer = customer;
  if (yyyymm) window._lastYYYYMM = yyyymm;
  else if (window._lastYYYYMM && !customer) yyyymm = window._lastYYYYMM;
  return { customer, yyyymm };
}

// ======== QUERY POWER BI + FORMAT ========
async function queryPBI(customer, yyyymm) {
  const mode = window.dataMode;
  let results = {};
  
  // Get customer info
  try {
    const info = await executeDax(buildInfoQuery(customer));
    if (info && info.length > 0) {
      results.bu = info[0]["'SB_FactCustomer'[BU]"] || 'Unknown';
      results.country = info[0]["'SB_FactCustomer'[Account Country]"] || 'Unknown';
      results.exactName = info[0]["'SB_FactCustomer'[Account Name]"] || customer;
    }
  } catch(e) { results.bu = 'Unknown'; results.country = 'Unknown'; results.exactName = customer; }

  // Get KPI data
  if (mode === 'kpi' || mode === 'both') {
    try {
      const kpi = await executeDax(buildKpiQuery(results.exactName || customer, yyyymm));
      if (kpi && kpi.length > 0) results.kpi = kpi[0];
    } catch(e) { results.kpiError = e.message; }
  }

  // Get CS data
  try {
    const cs = await executeDax(buildCsQuery(results.exactName || customer, yyyymm));
    if (cs && cs.length > 0) results.cs = cs[0];
  } catch(e) { results.csError = e.message; }

  // Get DWH data
  if (mode === 'dwh' || mode === 'both') {
    try {
      const dwh = await executeDax(buildDwhQuery(results.exactName || customer));
      if (dwh && dwh.length > 0) results.dwh = dwh[0];
    } catch(e) { results.dwhError = e.message; }
  }

  return results;
}

// ======== UI FUNCTIONS ========
function expandChat() {
  document.getElementById('collapsedView').classList.add('hidden');
  document.getElementById('expandedView').classList.add('active');
}
function collapseChat() {
  document.getElementById('expandedView').classList.remove('active');
  document.getElementById('collapsedView').classList.remove('hidden');
}

function setMode(m) {
  window.dataMode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('mode' + m.charAt(0).toUpperCase() + m.slice(1)).classList.add('active');
  // Fix ID mapping
  if(m==='kpi') document.getElementById('modeKpi').classList.add('active');
  if(m==='dwh') document.getElementById('modeDwh').classList.add('active');
  if(m==='both') document.getElementById('modeBoth').classList.add('active');
}

function saveApiKey() {
  API_KEY = document.getElementById('apiKeyInput').value.trim();
  try { localStorage.setItem('c360_apikey', API_KEY); } catch(e) {}
}

function addMessage(role, text) {
  const sb = document.getElementById('suggestionsBlock');
  if (sb) sb.remove();
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const avi = document.createElement('div');
  avi.className = 'msg-avi';
  avi.textContent = role === 'ai' ? 'EG' : '👤';
  const body = document.createElement('div');
  body.className = 'msg-body';
  body.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/`(.*?)`/g, '<code>$1</code>').replace(/\n/g, '<br>');
  div.appendChild(avi);
  div.appendChild(body);
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function addTyping() {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typingIndicator';
  div.innerHTML = '<div class="msg-avi">EG</div><div class="typing"><span></span><span></span><span></span></div>';
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function askSuggestion(el) {
  document.getElementById('userInput').value = el.textContent;
  sendMessage();
}

// ======== SEND MESSAGE ========
async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isLoading) return;
  input.value = '';
  isLoading = true;
  addMessage('user', text);
  addTyping();

  try {
    // Check auth
    if (!pbiToken) throw new Error('Please sign in with Microsoft first');
    if (!API_KEY) throw new Error('Please enter your Anthropic API key');

    // Extract customer + period
    const { customer, yyyymm } = extractParams(text);
    
    let pbiData = null;
    if (customer) {
      // Query Power BI live
      pbiData = await queryPBI(customer, yyyymm);
    }

    // Build system prompt
    const mode = window.dataMode;
    let systemPrompt = `You are the AI assistant for the Customer 360 dashboard at EG A/S. You answer questions using LIVE data from the Power BI model.

The user asked: "${text}"
Data mode: ${mode === 'kpi' ? 'KPI Measures' : mode === 'dwh' ? 'DWH Tables' : 'Both KPI + DWH'}`;

    if (pbiData) {
      systemPrompt += `\n\nLIVE DATA FROM POWER BI (just queried — this is the truth):`;
      systemPrompt += `\nCustomer: ${pbiData.exactName || customer}`;
      systemPrompt += `\nBU: ${pbiData.bu} | Country: ${pbiData.country}`;
      if (yyyymm) systemPrompt += `\nPeriod: ${yyyymm}`;
      
      if (pbiData.kpi) {
        const k = pbiData.kpi;
        systemPrompt += `\n\nSB KPI MEASURES${yyyymm ? ' for ' + yyyymm : ''}:`;
        systemPrompt += `\nMRR: ${k['[MRR]']} DKK`;
        systemPrompt += `\nARR Growth: ${k['[Growth]']}%`;
        systemPrompt += `\nNRR: ${k['[NRR]']}%`;
        systemPrompt += `\nGRR: ${k['[GRR]']}%`;
      }
      if (pbiData.cs) {
        const c = pbiData.cs;
        systemPrompt += `\n\nCS CASES${yyyymm ? ' for ' + yyyymm : ''}:`;
        systemPrompt += `\nOpened: ${c['[Opened]']}`;
        systemPrompt += `\nClosed: ${c['[Closed]']}`;
        systemPrompt += `\nBacklog: ${c['[Backlog]']}`;
      }
      if (pbiData.dwh) {
        const d = pbiData.dwh;
        systemPrompt += `\n\nDWH REVENUE (DKK BR millions):`;
        systemPrompt += `\n2024: ${d['[Y24]']}M | 2025: ${d['[Y25]']}M | 2026 YTD: ${d['[Y26]']}M`;
      }
    } else {
      systemPrompt += `\n\nNo specific customer was identified in the query. Help the user by suggesting they include a customer name and optionally a YYYYMM period.`;
    }

    systemPrompt += `\n\nFormat rules:
- Present data clearly with tables where appropriate
- If mode is 'Both', show a side-by-side comparison table
- Add brief insights (1-2 sentences) after the data
- If any value is null/blank, show "--"
- Always mention this is LIVE data from Power BI`;

    // Call Claude AI
    conversationHistory.push({ role: 'user', content: text });
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': API_KEY, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1500,
        system: systemPrompt,
        messages: conversationHistory.slice(-10)
      })
    });

    removeTyping();
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      addMessage('ai', '❌ ' + (err?.error?.message || 'Error ' + resp.status));
      conversationHistory.pop();
    } else {
      const data = await resp.json();
      const reply = data.content.map(c => c.text || '').join('\n').trim();
      addMessage('ai', reply);
      conversationHistory.push({ role: 'assistant', content: reply });
    }
  } catch (err) {
    removeTyping();
    addMessage('ai', '❌ ' + err.message);
  }
  isLoading = false;
}

  try {
    const saved = localStorage.getItem('c360_apikey');
    if (saved) { API_KEY = saved; document.getElementById('apiKeyInput').value = saved; }
  } catch(e) {}
  // Add backup click handler
  document.getElementById('collapsedView').addEventListener('click', expandChat);
});
