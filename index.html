function msLogin(){
  var key=document.getElementById('apiK').value.trim();
  if(!key){document.getElementById('msS').textContent='Enter AI key first (Step 1)';document.getElementById('msS').className='st err';return}
  // Encode API key in state so it survives the redirect
  var state=btoa(JSON.stringify({k:key,t:Date.now()}));
  var authUrl='https://login.microsoftonline.com/'+CFG.tid+'/oauth2/v2.0/authorize'
    +'?client_id='+CFG.cid
    +'&response_type=token'
    +'&redirect_uri='+encodeURIComponent(window.location.origin+window.location.pathname)
    +'&scope='+encodeURIComponent('https://analysis.windows.net/powerbi/api/Dataset.Read.All')
    +'&state='+encodeURIComponent(state)
    +'&nonce='+Math.random().toString(36).substr(2);
  // Navigate the iframe to Azure AD login
  window.location.href=authUrl;
}

// On page load: check if we're returning from Azure AD with a token
function checkRedirect(){
  var hash=window.location.hash;
  if(!hash||hash.indexOf('access_token')===-1) return false;
  // Parse the hash fragment
  var params={};
  hash.substr(1).split('&').forEach(function(p){var kv=p.split('=');params[kv[0]]=decodeURIComponent(kv[1]||'')});
  if(params.access_token){
    tk=params.access_token;
    // Recover API key from state
    if(params.state){
      try{var s=JSON.parse(atob(params.state));if(s.k)AK=s.k}catch(e){}
    }
    // Clean the URL hash
    history.replaceState(null,'',window.location.pathname);
    return true;
  }
  // Check for errors
  if(params.error){
    document.getElementById('msS').textContent=params.error_description||params.error;
    document.getElementById('msS').className='st err';
  }
  return false;
}

// === POWER BI API ===
function dax(q){
  return fetch('https://api.powerbi.com/v1.0/myorg/groups/'+CFG.wid+'/datasets/'+CFG.did+'/executeQueries',{
    method:'POST',headers:{'Authorization':'Bearer '+tk,'Content-Type':'application/json'},
    body:JSON.stringify({queries:[{query:q}],serializerSettings:{includeNulls:true}})
  }).then(function(r){
    if(r.status===401){tk=null;throw new Error('Session expired — click Sign in again')}
    if(!r.ok) return r.json().then(function(e){throw new Error(e&&e.error&&e.error.message||'PBI error')});
    return r.json().then(function(d){return d.results[0].tables[0].rows});
  });
}

function kQ(c,m){var f="'SB_FactCustomer'[Account Name]=""+c+""";var t=m?",'SB_DimDate'[YYYYMM]=""+m+""":"";return 'EVALUATE ROW("MRR",ROUND(CALCULATE([SB_MRR],'+f+t+'),0),"Growth",ROUND(CALCULATE([SB_Growth_test]*100,'+f+t+'),1),"NRR",ROUND(CALCULATE([SB_NRR_test]*100,'+f+t+'),1),"GRR",ROUND(CALCULATE([SB_GRR_test]*100,'+f+t+'),1))'}
function cQ(c,m){var f="'CS_datamart dimAccount'[Name]=""+c+""";var t=m?",'CS_datamart dimTime'[YYYYMM]=""+m+""":"";return 'EVALUATE ROW("Opened",CALCULATE([CS_Cases],'+f+t+'),"Closed",CALCULATE([CS_Closed Cases1],'+f+t+'),"Backlog",CALCULATE([CS_Backlog - Monthly Reporting],'+f+t+'))'}
function dQ(c){var f="'SB_FactCustomer'[Account Name]=""+c+""";return 'EVALUATE ROW("Y24",ROUND(CALCULATE(SUM('SB_FactCustomer'[DKK BR]),'+f+',YEAR('SB_FactCustomer'[Period])=2024),2),"Y25",ROUND(CALCULATE(SUM('SB_FactCustomer'[DKK BR]),'+f+',YEAR('SB_FactCustomer'[Period])=2025),2),"Y26",ROUND(CALCULATE(SUM('SB_FactCustomer'[DKK BR]),'+f+',YEAR('SB_FactCustomer'[Period])=2026),2))'}
function iQ(c){return 'EVALUATE TOPN(1,FILTER(SUMMARIZE('SB_FactCustomer','SB_FactCustomer'[Account Name],'SB_FactCustomer'[BU],'SB_FactCustomer'[Account Country]),'SB_FactCustomer'[Account Name]="'+c+'"))'}

function xP(q){
  var lq=q.toLowerCase();var ym=null;
  var m=lq.match(/(2024|2025|2026)(0[1-9]|1[0-2])/);if(m)ym=m[0];
  if(!ym){var ms={jan:'01',feb:'02',mar:'03',apr:'04',may:'05',jun:'06',jul:'07',aug:'08',sep:'09',oct:'10',nov:'11',dec:'12',january:'01',february:'02',march:'03',april:'04',june:'06',july:'07',august:'08',september:'09',october:'10',november:'11',december:'12'};for(var n in ms){var p1=lq.match(new RegExp(n+'\\s*(2024|2025|2026)'));var p2=lq.match(new RegExp('(2024|2025|2026)\\s*'+n));if(p1){ym=p1[1]+ms[n];break}if(p2){ym=p2[1]+ms[n];break}}}
  var cl=q.replace(/\d{6}/g,'').replace(/(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec|january|february|march|april|june|july|august|september|october|november|december)\s*(2024|2025|2026)/gi,'').replace(/(2024|2025|2026)\s*(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec|january|february|march|april|june|july|august|september|october|november|december)/gi,'').trim();
  var cu=null;if(cl.length>2)cu=cl.replace(/^(show|give|tell|what|how|me|is|about|for|the|of|in|data|everything|full|360|view)\s+/gi,'').replace(/\s+(data|kpi|revenue|mrr|growth|cases|info|details|for)$/gi,'').trim();
  if(cu&&cu.length<3)cu=null;if(!cu&&window._lc)cu=window._lc;if(cu)window._lc=cu;
  return{customer:cu,yyyymm:ym};
}

function qPBI(c,ym){
  var md=window.dm,r={};
  return dax(iQ(c)).then(function(i){if(i&&i.length>0){r.bu=i[0]["'SB_FactCustomer'[BU]"]||'?';r.co=i[0]["'SB_FactCustomer'[Account Country]"]||'?';r.en=i[0]["'SB_FactCustomer'[Account Name]"]||c}else{r.bu='?';r.co='?';r.en=c}}).catch(function(){r.bu='?';r.co='?';r.en=c})
  .then(function(){var nm=r.en||c;var ps=[];
    if(md==='kpi'||md==='both')ps.push(dax(kQ(nm,ym)).then(function(k){if(k&&k.length>0)r.kpi=k[0]}).catch(function(e){r.ke=e.message}));
    ps.push(dax(cQ(nm,ym)).then(function(cs){if(cs&&cs.length>0)r.cs=cs[0]}).catch(function(e){r.ce=e.message}));
    if(md==='dwh'||md==='both')ps.push(dax(dQ(nm)).then(function(d){if(d&&d.length>0)r.dwh=d[0]}).catch(function(e){r.de=e.message}));
    return Promise.all(ps);
  }).then(function(){return r});
}

function send(){
  var ip=document.getElementById('uI');var txt=ip.value.trim();if(!txt||busy)return;ip.value='';busy=true;
  addMsg('user',txt);addTp();
  if(!tk){rmTp();addMsg('ai','Please sign in with Microsoft first.');busy=false;return}
  var p=xP(txt);

  prom.then(function(pb){
    var md=window.dm;

      sys+='\nLIVE DATA:\nCustomer: '+(pb.en||p.customer)+' | BU: '+pb.bu+' | Country: '+pb.co;
      if(p.yyyymm)sys+='\nPeriod: '+p.yyyymm;
      if(pb.kpi){var k=pb.kpi;sys+='\nKPI'+(p.yyyymm?' '+p.yyyymm:'')+': MRR='+k['[MRR]']+' | Growth='+k['[Growth]']+'% | NRR='+k['[NRR]']+'% | GRR='+k['[GRR]']+'%'}
      if(pb.cs){var cs=pb.cs;sys+='\nCases: Opened='+cs['[Opened]']+' | Closed='+cs['[Closed]']+' | Backlog='+cs['[Backlog]']}
      if(pb.dwh){var d=pb.dwh;sys+='\nDWH: 2024='+d['[Y24]']+'M | 2025='+d['[Y25]']+'M | 2026='+d['[Y26]']+'M'}
    }else{sys+='\nNo customer found. Ask user to include customer name + YYYYMM.'}
    sys+='\nPresent clearly. Side-by-side table if Both. Brief insight. "--" for null. LIVE data.';
    hist.push({role:'user',content:txt});
    return fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':AK,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1500,system:sys,messages:hist.slice(-10)})});
  }).then(function(r){
    rmTp();
    if(!r.ok) return r.json().then(function(e){addMsg('ai','Error: '+(e&&e.error&&e.error.message||r.status));hist.pop()});
    return r.json().then(function(d){var rp=d.content.map(function(c){return c.text||''}).join('\n').trim();addMsg('ai',rp);hist.push({role:'assistant',content:rp})});
  }).catch(function(e){rmTp();addMsg('ai','Error: '+e.message)}).then(function(){busy=false});
}
